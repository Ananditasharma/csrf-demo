<!DOCTYPE html>
<html>
<head>
  <title>CSRF Demo - Forgot Password</title>
</head>
<body>

<h1>🔐 CSRF Demo - Forgot Password</h1>

<p>This simulates a malicious site attempting to trigger a forgot password request.</p>

<!-- Direct form submission (no JS required → CSP safe) -->
<form action="http://localhost/api/tenant/v1/merchants/testroute" method="POST">
  
  <!-- Payload -->
  <input type="hidden" name="email" value="anandita.sharma@getfareye.com">

  <!-- Extra fields (if backend expects them) -->
  <input type="hidden" name="tenant" value="couriersplease">
  <input type="hidden" name="userType" value="superadmin">
  <input type="hidden" name="role" value="superadmin">

  <button type="submit">🚨 Trigger CSRF Attack</button>
</form>

<hr>

<h3>Expected Result:</h3>
<ul>
  <li>Request is sent from browser ✔️</li>
  <li>Cookies (session) are included ✔️</li>
  <li>But CSRF token is missing ❌</li>
  <li><strong>Backend rejects request ✅</strong></li>
</ul>

</body>
</html>
